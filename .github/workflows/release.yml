name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (example: 0.1.0)'
        required: true
      create_tag:
        description: 'Create git tag if missing'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Create tag
        if: ${{ inputs.create_tag }}
        shell: pwsh
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          if (-not (git tag --list "v${{ inputs.version }}")) {
            git tag "v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          }

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/sleep-time-windows-v${{ inputs.version }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/sleep-time-windows-v${{ inputs.version }}.zip
